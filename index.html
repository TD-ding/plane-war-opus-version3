<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>飞机大战 · Plane War</title>
<style>
  /* ===================== 样式区 ===================== */
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #0b1026;
    color: #e6ecff;
    font-family: -apple-system, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    overflow: hidden;
  }
  #wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 12px;
  }
  #game {
    background: linear-gradient(180deg, #0a1330 0%, #060a1c 100%);
    border: 1px solid #2a3a72;
    border-radius: 8px;
    box-shadow: 0 8px 40px rgba(0, 0, 0, 0.6);
    touch-action: none;
  }
  .hint {
    font-size: 13px;
    color: #8ea0d8;
    letter-spacing: 0.3px;
  }
  .hint b { color: #cfe0ff; }
</style>
</head>
<body>
  <div id="wrap">
    <canvas id="game" width="480" height="720"></canvas>
    <div class="hint">
      移动：<b>方向键 / WASD</b> &nbsp;·&nbsp; 射击：<b>自动（空格加射）</b> &nbsp;·&nbsp; 炸弹：<b>B</b> &nbsp;·&nbsp; 暂停：<b>P / Esc</b> &nbsp;·&nbsp; 静音：<b>M</b> &nbsp;·&nbsp; 开始/重开：<b>回车</b>
    </div>
  </div>

<script>
"use strict";

/* ============================================================
 * 飞机大战 (Plane War) — HTML5 Canvas 单文件实现
 *
 * 分区说明：
 *   1. 配置与全局状态 (CONFIG / GameState)
 *   2. 输入处理 (Input)
 *   3. 实体类 (Player / Bullet / Enemy / Particle)
 *   4. 生成器与碰撞检测 (spawn / collision)
 *   5. 主循环 (update / render / loop)
 * ============================================================ */

(function () {

  /* ===================== 1. 配置与全局状态 ===================== */

  const canvas = document.getElementById("game");
  if (!canvas || !canvas.getContext) {
    alert("当前浏览器不支持 HTML5 Canvas，无法运行游戏。");
    return;
  }
  const ctx = canvas.getContext("2d");
  const W = canvas.width;
  const H = canvas.height;

  // 速度基准帧率：所有“每帧”位移量都以 60fps 为基准，
  // 实际运行时按 dt 归一化（见 timeScale），从而在不同刷新率屏幕上速度一致。
  const BASE_FPS = 60;

  const CONFIG = {
    // 基准帧间隔(ms)，用于把每帧位移量换算成与帧率无关的速度
    baseFrameMs: 1000 / BASE_FPS,

    player: {
      w: 38, h: 44,
      speed: 5,              // 键盘移动速度（像素/基准帧）
      maxHp: 5,
      fireInterval: 220,     // 自动开火间隔(ms)
      manualFireInterval: 120, // 空格手动连射间隔(ms)，比自动更快以体现“加射”
      pointerLerp: 0.35,     // 指针拖动平滑系数（每基准帧趋近比例）
      startY: 90,            // 出生时距底部高度
      hitFlashMs: 600,       // 受击闪烁持续时间(ms)
      flashBlinkMs: 60,      // 受击闪烁单次明暗切换周期(ms)
      invincibleMs: 1200,    // 受击后无敌时间(ms)，期间不再扣血，避免密集敌机瞬间团灭
      // 碰撞判定缩放：飞机实际命中范围只取机身中间一小块（机翼空隙不算），
      // 让“擦边”更宽容。0.45 表示按宽高各取 45%。
      hitboxScale: 0.45,
    },

    bullet: { w: 5, h: 14, speed: 9, damage: 1 },

    // 火力等级：随连击/道具成长，决定一次开火打出几发散射。
    // 每升一级多一发，并向两侧张开一定角度，越猛越爽；被撞降一级。
    power: {
      max: 4,                // 最高火力等级（1=单发，4=四发）
      spreadDeg: 9,          // 相邻两发之间的张角(度)
    },

    // 敌机子弹：大敌机会朝玩家方向射击，玩家需要躲避
    enemyBullet: {
      w: 6, h: 12,
      speed: 3.2,            // 下落/飞行速度（像素/基准帧）
      damage: 1,
      color: "#ff7ed4",
      fireMin: 1400,         // 单架大敌机两次开火最小间隔(ms)
      fireRange: 1200,       // 开火间隔随机附加范围(ms)
    },

    enemy: {
      baseSpeed: 1.6,        // 敌机基础下落速度（像素/基准帧）
      baseSpawn: 900,        // 初始刷新间隔(ms)
      minSpawn: 320,         // 最快刷新间隔(ms)
      minSize: 30,           // 敌机尺寸下限
      sizeRange: 16,         // 敌机尺寸随机范围
      speedJitter: 0.8,      // 速度随机抖动
      bigHpSize: 40,         // 超过此尺寸算“大敌机”，血量翻倍
      bigHp: 2, smallHp: 1,
      bigValue: 30, smallValue: 10,
      wobbleSpeed: 0.05,     // 左右摆动相位增速（每基准帧）
      wobbleAmp: 0.6,        // 左右摆动幅度（像素/基准帧）
      maxOnScreen: 12,       // 屏幕上同时存在的敌机数量上限，避免后期“一堵墙”
    },

    // 连击系统：连续击中不漏接则连击数累积，得分按倍率翻倍。
    // 超过 comboTimeout 没有新的击中则连击清零。
    combo: {
      timeout: 2200,         // 连击保持窗口(ms)，期间未再击毁则断连
      // 不同连击数对应的得分倍率档位（取 <= 当前连击的最高档）
      tiers: [
        { combo: 0,  mult: 1 },
        { combo: 5,  mult: 2 },
        { combo: 10, mult: 3 },
        { combo: 20, mult: 4 },
      ],
    },

    // 道具掉落：敌机被击毁后有概率掉落道具，玩家飞过去拾取。
    // 道具下落，超过 lifeMs 未拾取则消失（带闪烁预警）。
    powerup: {
      dropChance: 0.16,      // 每架敌机击毁后的掉落概率
      size: 22,
      fallSpeed: 1.4,        // 下落速度（像素/基准帧）
      lifeMs: 7000,          // 存活时间(ms)，到期消失
      blinkBeforeMs: 2000,   // 剩余多少 ms 开始闪烁预警
      healAmount: 1,         // 回血道具恢复的血量
      shieldMs: 6000,        // 护盾道具持续时间(ms)
      // 各类型权重（掉落时按权重随机选一种）
      weights: { power: 3, shield: 2, heal: 2, bomb: 1 },
      colors: {
        power: "#ffd24a", shield: "#5ad1ff", heal: "#5aff9a", bomb: "#ff7e7e",
      },
    },

    // 清屏炸弹：拾取 bomb 道具可存储，紧急时按 B 释放，清空全屏敌机与敌弹
    bomb: { max: 3 },

    // 护盾：拾取后一段时间内被撞不掉血（与无敌不同，由道具赋予）
    shield: { ringColor: "#5ad1ff" },

    particle: {
      minLife: 400, lifeRange: 300,  // 寿命(ms)
      minSpeed: 1, speedRange: 4,    // 初速度
      damping: 0.94,                 // 每基准帧速度衰减
      minSize: 2, sizeRange: 3,
    },

    stars: { count: 70, minSpeed: 0.4, speedRange: 1.5, minR: 0.3, rRange: 1.6 },

    // 得分飘字：击毁敌机时在其位置弹出 "+分数" 并上浮淡出
    scorePop: {
      life: 700,           // 存活时间(ms)
      rise: 28,            // 上浮总距离(px)
      color: "#ffe680",
    },

    // 屏幕震动：击毁/受击时短促抖动画面，增强打击感
    shake: {
      killAmp: 4,          // 击毁敌机震幅(px)
      crashAmp: 9,         // 玩家受击震幅(px)
      decayMs: 260,        // 震动衰减时长(ms)
    },

    // 难度递增参数
    difficulty: {
      rampMs: 30000,         // 速度爬升时间窗(ms)
      maxSpeedScale: 2.0,    // 速度倍率上限（额外加成）
      spawnReduceCap: 560,   // 刷新间隔最多缩短量(ms)
      spawnReduceRate: 60,   // 每经过多少 ms 刷新间隔缩短 1ms
    },

    // 爆炸/受击效果：粒子数量与颜色集中配置，方便统一调校
    fx: {
      bulletHit:   { count: 4,  color: "#ffd27f" }, // 子弹命中敌机
      enemyKill:   { count: 16, color: "#ff9a5a" }, // 击毁敌机
      playerCrash: { count: 18, color: "#ff5a7a" }, // 玩家撞击敌机
      gameOver:    { count: 28, color: "#5ad1ff" }, // 游戏结束玩家爆炸
    },

    // 实体配色（绘制时引用，便于统一换肤）
    colors: {
      player: { body: "#5ad1ff", cockpit: "#cdefff" },
      enemyBig: "#ff6b9d",   // 大敌机机身
      enemySmall: "#ff8a5a", // 小敌机机身
      enemyCockpit: "#3a0a1a",
      bullet: "#ffe680",
    },

    // 音效：全部用 WebAudio 程序化生成（无外部音频文件）。
    // 每项定义一个简单的振荡器“电子音”：波形、起止频率、时长、音量。
    sound: {
      masterVolume: 0.18,    // 总音量（偏低，避免连射时刺耳）
      shoot:    { type: "square",   f0: 880,  f1: 660,  dur: 0.06, vol: 0.25 },
      hit:      { type: "square",   f0: 520,  f1: 400,  dur: 0.05, vol: 0.4  },
      explode:  { type: "sawtooth", f0: 240,  f1: 60,   dur: 0.22, vol: 0.7  },
      crash:    { type: "sawtooth", f0: 180,  f1: 40,   dur: 0.32, vol: 0.9  },
      pickup:   { type: "triangle", f0: 660,  f1: 1320, dur: 0.16, vol: 0.6  },
      bomb:     { type: "sawtooth", f0: 420,  f1: 50,   dur: 0.5,  dur2: 0.5, vol: 1.0 },
      powerup:  { type: "triangle", f0: 520,  f1: 1040, dur: 0.18, vol: 0.6  },
      shieldBlock: { type: "triangle", f0: 1200, f1: 1800, dur: 0.1, vol: 0.5 }, // 护盾挡弹的金属“叮”声
    },
  };

  // 游戏状态机：'ready' | 'playing' | 'paused' | 'over'
  const Game = {
    state: "ready",
    score: 0,
    best: 0,
    hp: CONFIG.player.maxHp,
    elapsed: 0,        // 已进行时间(ms)，用于难度递增
    lastEnemySpawn: 0,
    lastFire: 0,
    lastManualFire: 0, // 空格手动射击冷却计时
    invincible: 0,     // 剩余无敌时间(ms)，>0 时玩家不再扣血
    shake: 0,          // 剩余屏幕震动时间(ms)
    shakeAmp: 0,       // 当前震动幅度(px)
    power: 1,          // 当前火力等级（1..CONFIG.power.max）
    combo: 0,          // 当前连击数
    comboTimer: 0,     // 连击保持倒计时(ms)，归零则断连
    bombs: 0,          // 库存清屏炸弹数
    shieldTime: 0,     // 剩余护盾时间(ms)，>0 时被撞不掉血
  };

  // 读取本地最高分（带容错：非数字或被篡改为负数时忽略）
  try {
    const saved = parseInt(localStorage.getItem("planeWarBest") || "0", 10);
    if (!isNaN(saved) && saved >= 0) Game.best = saved;
  } catch (e) { /* localStorage 不可用时忽略 */ }

  let player = null;
  let bullets = [];
  let enemies = [];
  let enemyBullets = [];   // 敌机射出的子弹
  let powerups = [];       // 掉落道具
  let particles = [];
  let scorePops = [];
  let stars = [];

  /* ===================== 音效（WebAudio 程序化生成） ===================== */

  // 用 WebAudio 即时合成简单电子音，避免任何外部音频文件。
  // 浏览器要求音频上下文在用户交互后才能启动，故首次按键/点击时惰性创建。
  const Sound = (function () {
    let actx = null;
    let muted = false;
    let primed = false;

    function ensure() {
      if (actx) return actx;
      try {
        const AC = window.AudioContext || window.webkitAudioContext;
        if (AC) actx = new AC();
      } catch (e) { actx = null; }
      return actx;
    }
    // 在上下文里跑一个 0 音量的极短音，把音频图“热身”起来。
    // 部分浏览器新建/刚 resume 的 AudioContext 第一声会被丢掉，
    // 故首次交互时静音预热一次，保证后续第一次开火就有声。
    function prime(a) {
      if (primed || !a) return;
      primed = true;
      try {
        const now = a.currentTime;
        const osc = a.createOscillator();
        const gain = a.createGain();
        gain.gain.setValueAtTime(0.0001, now);
        osc.connect(gain).connect(a.destination);
        osc.start(now);
        osc.stop(now + 0.02);
      } catch (e) { /* 预热失败不影响游戏 */ }
    }
    // 用户交互后恢复（部分浏览器初始为 suspended），并做一次预热
    function resume() {
      const a = ensure();
      if (!a) return;
      if (a.state === "suspended") a.resume().catch(() => {});
      prime(a);
    }

    // 播放一个频率从 f0 滑到 f1 的短音；带快速衰减包络，听感像“电子音效”
    function play(spec) {
      if (muted || !spec) return;
      const a = ensure();
      if (!a) return;
      // 首次发声前确保上下文已 running：浏览器新建的 AudioContext 常为
      // suspended，若不在调度前 resume，第一声会被丢掉（开火没声音的根因）
      if (a.state === "suspended") a.resume().catch(() => {});
      try {
        const now = a.currentTime;
        const osc = a.createOscillator();
        const gain = a.createGain();
        osc.type = spec.type || "square";
        osc.frequency.setValueAtTime(spec.f0, now);
        osc.frequency.exponentialRampToValueAtTime(
          Math.max(1, spec.f1), now + spec.dur);
        const vol = CONFIG.sound.masterVolume * (spec.vol == null ? 1 : spec.vol);
        gain.gain.setValueAtTime(vol, now);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + spec.dur);
        osc.connect(gain).connect(a.destination);
        osc.start(now);
        osc.stop(now + spec.dur + 0.02);
      } catch (e) { /* 音频失败不影响游戏 */ }
    }

    return {
      resume,
      toggleMute() { muted = !muted; return muted; },
      isMuted() { return muted; },
      shoot()   { play(CONFIG.sound.shoot); },
      hit()     { play(CONFIG.sound.hit); },
      explode() { play(CONFIG.sound.explode); },
      crash()   { play(CONFIG.sound.crash); },
      pickup()  { play(CONFIG.sound.pickup); },
      powerup() { play(CONFIG.sound.powerup); },
      shieldBlock() { play(CONFIG.sound.shieldBlock); },
      bomb()    { play(CONFIG.sound.bomb); },
    };
  })();

  /* ===================== 2. 输入处理 ===================== */

  const keys = Object.create(null);

  function onKeyDown(e) {
    // 某些输入法/特殊按键可能没有 e.key，做防护避免崩溃
    if (typeof e.key !== "string" || e.key === "") return;
    const k = e.key.toLowerCase();
    keys[k] = true;
    // 任意按键都尝试恢复音频上下文（浏览器要求用户交互后才能发声）
    Sound.resume();
    // 阻止方向键/空格滚动页面
    if ([" ", "arrowup", "arrowdown", "arrowleft", "arrowright"].includes(k)) {
      e.preventDefault();
    }
    if (k === "enter") {
      if (Game.state === "ready" || Game.state === "over") startGame();
    }
    // 暂停 / 继续：P 或 Esc，仅在游戏进行/暂停态间切换
    if (k === "p" || k === "escape") {
      togglePause();
    }
    // 清屏炸弹：B 键，库存 > 0 且游戏进行中时释放
    if (k === "b") {
      useBomb();
    }
    // 静音开关：M 键
    if (k === "m") {
      Sound.toggleMute();
    }
  }
  function onKeyUp(e) {
    if (typeof e.key !== "string" || e.key === "") return;
    keys[e.key.toLowerCase()] = false;
  }
  window.addEventListener("keydown", onKeyDown);
  window.addEventListener("keyup", onKeyUp);

  // 触屏/鼠标：拖动飞机（移动端友好）
  let pointerActive = false;
  function pointerMove(clientX, clientY) {
    const rect = canvas.getBoundingClientRect();
    const x = (clientX - rect.left) * (W / rect.width);
    const y = (clientY - rect.top) * (H / rect.height);
    if (player) { player.targetX = x; player.targetY = y; }
  }
  canvas.addEventListener("pointerdown", (e) => {
    pointerActive = true;
    Sound.resume();
    pointerMove(e.clientX, e.clientY);
    if (Game.state === "ready" || Game.state === "over") startGame();
  });
  canvas.addEventListener("pointermove", (e) => {
    if (pointerActive) pointerMove(e.clientX, e.clientY);
  });
  window.addEventListener("pointerup", () => { pointerActive = false; });

  // 暂停切换：playing ⇄ paused，其它状态忽略
  function togglePause() {
    if (Game.state === "playing") Game.state = "paused";
    else if (Game.state === "paused") Game.state = "playing";
  }

  // 切出标签页 / 窗口失焦时自动暂停，避免“切回来已经死了”
  function autoPause() {
    if (Game.state === "playing") Game.state = "paused";
  }
  document.addEventListener("visibilitychange", () => {
    if (document.hidden) autoPause();
  });
  window.addEventListener("blur", autoPause);

  /* ===================== 3. 实体类 ===================== */

  // 实体绘制通用包装：保存上下文 → 平移到实体坐标 → 执行绘制 → 恢复。
  // 飞机/敌机绘制套路一致，集中在此，保证无论绘制中发生什么都会恢复画布状态。
  function drawAt(x, y, drawFn) {
    ctx.save();
    try {
      ctx.translate(x, y);
      drawFn();
    } finally {
      ctx.restore();
    }
  }

  class Player {
    constructor() {
      this.w = CONFIG.player.w;
      this.h = CONFIG.player.h;
      this.x = W / 2;
      this.y = H - CONFIG.player.startY;
      this.targetX = this.x;   // 指针拖动目标
      this.targetY = this.y;
      this.hitFlash = 0;       // 受击闪烁计时
    }
    update(dt) {
      const ts = timeScale(dt);
      const s = CONFIG.player.speed * ts;
      // 键盘移动
      if (keys["arrowleft"] || keys["a"]) this.x -= s;
      if (keys["arrowright"] || keys["d"]) this.x += s;
      if (keys["arrowup"] || keys["w"]) this.y -= s;
      if (keys["arrowdown"] || keys["s"]) this.y += s;
      // 指针拖动（平滑趋近，按帧率归一化）
      if (pointerActive) {
        const lerp = CONFIG.player.pointerLerp * ts;
        this.x += (this.targetX - this.x) * lerp;
        this.y += (this.targetY - this.y) * lerp;
      }
      // 边界约束
      const hw = this.w / 2, hh = this.h / 2;
      this.x = Math.max(hw, Math.min(W - hw, this.x));
      this.y = Math.max(hh, Math.min(H - hh, this.y));
      if (this.hitFlash > 0) this.hitFlash -= dt;
    }
    draw() {
      drawAt(this.x, this.y, () => {
        const col = CONFIG.colors.player;
        // 受击/无敌期间闪烁，给玩家“当前无敌”的视觉反馈
        const blinking = this.hitFlash > 0 || Game.invincible > 0;
        const phase = Math.max(this.hitFlash, Game.invincible);
        if (blinking &&
            Math.floor(phase / CONFIG.player.flashBlinkMs) % 2 === 0) {
          ctx.globalAlpha = 0.4;
        }
        // 机身
        ctx.fillStyle = col.body;
        ctx.beginPath();
        ctx.moveTo(0, -this.h / 2);
        ctx.lineTo(this.w / 2, this.h / 2);
        ctx.lineTo(0, this.h / 2 - 8);
        ctx.lineTo(-this.w / 2, this.h / 2);
        ctx.closePath();
        ctx.fill();
        // 座舱
        ctx.fillStyle = col.cockpit;
        ctx.beginPath();
        ctx.arc(0, -4, 5, 0, Math.PI * 2);
        ctx.fill();
        // 尾焰
        ctx.fillStyle = "rgba(255,170,60," + (0.5 + Math.random() * 0.4).toFixed(2) + ")";
        ctx.beginPath();
        ctx.moveTo(-6, this.h / 2 - 6);
        ctx.lineTo(0, this.h / 2 + 8 + Math.random() * 6);
        ctx.lineTo(6, this.h / 2 - 6);
        ctx.closePath();
        ctx.fill();
      });
    }
  }

  class Bullet {
    constructor(x, y, angle) {
      this.x = x;
      this.y = y;
      this.w = CONFIG.bullet.w;
      this.h = CONFIG.bullet.h;
      this.dead = false;
      // angle: 相对正上方的偏角(弧度)，0 = 竖直向上。用于散射。
      const a = angle || 0;
      const sp = CONFIG.bullet.speed;
      this.vx = Math.sin(a) * sp;
      this.vy = -Math.cos(a) * sp;
    }
    update(dt) {
      const ts = timeScale(dt);
      this.x += this.vx * ts;
      this.y += this.vy * ts;
      if (this.y + this.h < 0 || this.x + this.w < 0 || this.x - this.w > W) {
        this.dead = true;
      }
    }
    draw() {
      ctx.fillStyle = CONFIG.colors.bullet;
      ctx.fillRect(this.x - this.w / 2, this.y - this.h / 2, this.w, this.h);
    }
  }

  class Enemy {
    constructor(speedScale) {
      const ec = CONFIG.enemy;
      this.w = ec.minSize + Math.random() * ec.sizeRange;
      this.h = this.w * 0.9;
      this.x = this.w / 2 + Math.random() * (W - this.w);
      this.y = -this.h;
      this.speed = ec.baseSpeed * speedScale + Math.random() * ec.speedJitter;
      const big = this.w > ec.bigHpSize;
      this.big = big;
      this.hp = big ? ec.bigHp : ec.smallHp;       // 大敌机血厚
      this.value = big ? ec.bigValue : ec.smallValue;
      this.dead = false;
      this.wobble = Math.random() * Math.PI * 2;
      // 大敌机会开火：初始化下一次开火倒计时
      this.canShoot = big;
      this.fireTimer = CONFIG.enemyBullet.fireMin +
        Math.random() * CONFIG.enemyBullet.fireRange;
    }
    update(dt) {
      const ts = timeScale(dt);
      const ec = CONFIG.enemy;
      this.y += this.speed * ts;
      this.wobble += ec.wobbleSpeed * ts;
      this.x += Math.sin(this.wobble) * ec.wobbleAmp * ts;   // 轻微左右摆动
      // 大敌机进入屏幕后按计时朝玩家方向开火
      if (this.canShoot && this.y > 0 && Game.state === "playing") {
        this.fireTimer -= dt;
        if (this.fireTimer <= 0) {
          enemyFire(this);
          this.fireTimer = CONFIG.enemyBullet.fireMin +
            Math.random() * CONFIG.enemyBullet.fireRange;
        }
      }
      if (this.y - this.h > H) this.dead = true; // 飞出屏幕（玩家漏掉）
    }
    draw() {
      drawAt(this.x, this.y, () => {
        const col = CONFIG.colors;
        ctx.fillStyle = this.big ? col.enemyBig : col.enemySmall;
        ctx.beginPath();
        ctx.moveTo(0, this.h / 2);
        ctx.lineTo(this.w / 2, -this.h / 2);
        ctx.lineTo(0, -this.h / 2 + 8);
        ctx.lineTo(-this.w / 2, -this.h / 2);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = col.enemyCockpit;
        ctx.beginPath();
        ctx.arc(0, 2, 4, 0, Math.PI * 2);
        ctx.fill();
      });
    }
  }

  class Particle {
    constructor(x, y, color) {
      const pc = CONFIG.particle;
      this.x = x;
      this.y = y;
      const a = Math.random() * Math.PI * 2;
      const sp = pc.minSpeed + Math.random() * pc.speedRange;
      this.vx = Math.cos(a) * sp;
      this.vy = Math.sin(a) * sp;
      this.life = pc.minLife + Math.random() * pc.lifeRange;
      this.maxLife = this.life;
      this.color = color;
      this.size = pc.minSize + Math.random() * pc.sizeRange;
      this.dead = false;
    }
    update(dt) {
      const ts = timeScale(dt);
      this.x += this.vx * ts;
      this.y += this.vy * ts;
      // 速度衰减按帧率归一化（指数衰减）
      const damp = Math.pow(CONFIG.particle.damping, ts);
      this.vx *= damp;
      this.vy *= damp;
      this.life -= dt;
      if (this.life <= 0) this.dead = true;
    }
    draw() {
      // 用 save/restore 隔离 globalAlpha，避免泄漏到后续绘制
      ctx.save();
      ctx.globalAlpha = Math.max(0, this.life / this.maxLife);
      ctx.fillStyle = this.color;
      ctx.fillRect(this.x, this.y, this.size, this.size);
      ctx.restore();
    }
  }

  // 敌机子弹：从大敌机射出，朝玩家当时的方向飞行
  class EnemyBullet {
    constructor(x, y, vx, vy) {
      const eb = CONFIG.enemyBullet;
      this.x = x;
      this.y = y;
      this.w = eb.w;
      this.h = eb.h;
      this.vx = vx;
      this.vy = vy;
      this.dead = false;
    }
    update(dt) {
      const ts = timeScale(dt);
      this.x += this.vx * ts;
      this.y += this.vy * ts;
      // 飞出屏幕任一边界即回收
      if (this.y - this.h > H || this.y + this.h < 0 ||
          this.x + this.w < 0 || this.x - this.w > W) this.dead = true;
    }
    draw() {
      ctx.save();
      ctx.fillStyle = CONFIG.enemyBullet.color;
      ctx.beginPath();
      ctx.ellipse(this.x, this.y, this.w / 2, this.h / 2, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
  }

  // 掉落道具：从击毁位置下落，玩家碰到即拾取；到期未拾取则闪烁后消失。
  // type: 'power' | 'shield' | 'heal' | 'bomb'
  class Powerup {
    constructor(x, y, type) {
      const pc = CONFIG.powerup;
      this.x = x;
      this.y = y;
      this.w = pc.size;
      this.h = pc.size;
      this.type = type;
      this.life = pc.lifeMs;
      this.dead = false;
    }
    update(dt) {
      this.y += CONFIG.powerup.fallSpeed * timeScale(dt);
      this.life -= dt;
      if (this.life <= 0 || this.y - this.h > H) this.dead = true;
    }
    draw() {
      const pc = CONFIG.powerup;
      ctx.save();
      // 临近消失时闪烁预警
      if (this.life < pc.blinkBeforeMs &&
          Math.floor(this.life / 150) % 2 === 0) {
        ctx.globalAlpha = 0.35;
      }
      drawAt(this.x, this.y, () => {
        const r = this.w / 2;
        const color = pc.colors[this.type] || "#ffffff";
        // 圆角方块底
        ctx.fillStyle = "rgba(8,12,28,0.85)";
        ctx.strokeStyle = color;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(0, 0, r, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
        // 中心图标字符，简单标识类型
        ctx.fillStyle = color;
        ctx.font = "bold 14px sans-serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        const icon = { power: "▲", shield: "◈", heal: "+", bomb: "✸" }[this.type] || "?";
        ctx.fillText(icon, 0, 1);
      });
      ctx.restore();
    }
  }

  // 得分飘字：在击毁位置弹出 "+分数"，随时间上浮并淡出
  class ScorePop {
    constructor(x, y, value) {
      this.x = x;
      this.y = y;
      this.value = value;
      this.life = CONFIG.scorePop.life;
      this.maxLife = this.life;
      this.dead = false;
    }
    update(dt) {
      this.life -= dt;
      if (this.life <= 0) this.dead = true;
    }
    draw() {
      const sp = CONFIG.scorePop;
      const t = 1 - this.life / this.maxLife;   // 0→1 进度
      ctx.save();
      ctx.globalAlpha = Math.max(0, this.life / this.maxLife);
      ctx.fillStyle = sp.color;
      ctx.font = "bold 16px sans-serif";
      ctx.textAlign = "center";
      ctx.fillText("+" + this.value, this.x, this.y - t * sp.rise);
      ctx.restore();
    }
  }

  // 背景星空
  function initStars() {
    const sc = CONFIG.stars;
    stars = [];
    for (let i = 0; i < sc.count; i++) {
      stars.push({
        x: Math.random() * W,
        y: Math.random() * H,
        r: Math.random() * sc.rRange + sc.minR,
        sp: Math.random() * sc.speedRange + sc.minSpeed,
      });
    }
  }

  // 星空滚动更新（与其它实体保持一致的 update(dt) 风格）
  function updateStars(dt) {
    const ts = timeScale(dt);
    for (const s of stars) {
      s.y += s.sp * ts;
      if (s.y > H) { s.y = 0; s.x = Math.random() * W; }
    }
  }

  /* ===================== 4. 生成器与碰撞检测 ===================== */

  // 帧率归一化系数：把“按 60fps 每帧”设计的位移量换算成与帧率无关的步进。
  // 例如 144Hz 屏幕单帧 dt≈6.9ms，ts≈0.42，位移按比例缩小，整体速度保持一致。
  function timeScale(dt) {
    return dt / CONFIG.baseFrameMs;
  }

  // 在 (x,y) 处生成一组爆炸粒子。fx 为 CONFIG.fx 中的某项 { count, color }
  function spawnExplosion(x, y, fx) {
    for (let i = 0; i < fx.count; i++) particles.push(new Particle(x, y, fx.color));
  }

  // 触发屏幕震动：取较大的幅度，刷新衰减计时（多次命中不会越来越弱）
  function triggerShake(amp) {
    Game.shakeAmp = Math.max(Game.shakeAmp, amp);
    Game.shake = CONFIG.shake.decayMs;
  }

  function fire() {
    if (!player) return;
    const px = player.x;
    const py = player.y - player.h / 2;
    const level = Math.max(1, Math.min(CONFIG.power.max, Game.power));
    const spread = CONFIG.power.spreadDeg * Math.PI / 180;
    // 火力等级决定发数：以正上方为中心，向两侧对称张开。
    // 1 发竖直；2 发对称偏角；3 发中间竖直 + 两侧；4 发对称四发……
    for (let i = 0; i < level; i++) {
      // 角度偏移：让 level 发均匀分布于 [-(level-1)/2, +(level-1)/2] * spread
      const angle = (i - (level - 1) / 2) * spread;
      bullets.push(new Bullet(px, py, angle));
    }
    Sound.shoot();
  }

  // 大敌机朝玩家当前位置发射一颗子弹
  function enemyFire(enemy) {
    if (!player) return;
    const eb = CONFIG.enemyBullet;
    const dx = player.x - enemy.x;
    const dy = player.y - enemy.y;
    const len = Math.hypot(dx, dy) || 1;
    const vx = (dx / len) * eb.speed;
    const vy = (dy / len) * eb.speed;
    enemyBullets.push(new EnemyBullet(enemy.x, enemy.y + enemy.h / 2, vx, vy));
  }

  // 连击当前得分倍率：取连击数所达到的最高档
  function comboMultiplier() {
    let mult = 1;
    for (const tier of CONFIG.combo.tiers) {
      if (Game.combo >= tier.combo) mult = tier.mult;
    }
    return mult;
  }

  // 击毁敌机时累加连击并刷新保持窗口
  function addCombo() {
    Game.combo += 1;
    Game.comboTimer = CONFIG.combo.timeout;
  }

  // 火力升一级（达上限则不变）
  function addPower() {
    if (Game.power < CONFIG.power.max) Game.power += 1;
  }
  // 被撞降一级（不低于 1）
  function dropPower() {
    if (Game.power > 1) Game.power -= 1;
  }

  // 按权重随机选一种道具类型
  function pickPowerupType() {
    const w = CONFIG.powerup.weights;
    const entries = Object.keys(w);
    let total = 0;
    for (const k of entries) total += w[k];
    let r = Math.random() * total;
    for (const k of entries) {
      r -= w[k];
      if (r <= 0) return k;
    }
    return entries[0];
  }

  // 敌机击毁后按概率掉落道具
  function maybeDropPowerup(x, y) {
    if (Math.random() < CONFIG.powerup.dropChance) {
      powerups.push(new Powerup(x, y, pickPowerupType()));
    }
  }

  // 拾取道具：按类型生效
  function applyPowerup(type) {
    const pc = CONFIG.powerup;
    if (type === "power") {
      addPower();
      Sound.powerup();
    } else if (type === "shield") {
      Game.shieldTime = pc.shieldMs;
      Sound.pickup();
    } else if (type === "heal") {
      Game.hp = Math.min(CONFIG.player.maxHp, Game.hp + pc.healAmount);
      Sound.pickup();
    } else if (type === "bomb") {
      Game.bombs = Math.min(CONFIG.bomb.max, Game.bombs + 1);
      Sound.pickup();
    }
  }

  // 释放清屏炸弹：清空全屏敌机与敌弹，每架敌机计分 + 爆炸特效
  function useBomb() {
    if (Game.state !== "playing" || Game.bombs <= 0) return;
    Game.bombs -= 1;
    for (const e of enemies) {
      if (e.dead) continue;
      e.dead = true;
      Game.score += e.value;
      spawnExplosion(e.x, e.y, CONFIG.fx.enemyKill);
      scorePops.push(new ScorePop(e.x, e.y, e.value));
    }
    // 一并清掉飞行中的敌弹
    for (const eb of enemyBullets) eb.dead = true;
    triggerShake(CONFIG.shake.crashAmp);
    Sound.bomb();
  }

  // 难度随时间递增：敌机更快、刷新更密
  function difficultyScale() {
    const d = CONFIG.difficulty;
    return 1 + Math.min(d.maxSpeedScale, Game.elapsed / d.rampMs);
  }
  function spawnInterval() {
    const d = CONFIG.difficulty;
    const reduce = Math.min(d.spawnReduceCap, Game.elapsed / d.spawnReduceRate);
    return Math.max(CONFIG.enemy.minSpawn, CONFIG.enemy.baseSpawn - reduce);
  }

  // AABB 矩形相交检测。
  // sa/sb 为 a、b 各自的命中范围缩放（默认 1 = 用完整尺寸）；
  // 玩家碰撞时传入较小的 scale，只让机身中间一小块算被撞。
  function hit(a, b, sa, sb) {
    const aw = a.w * (sa || 1), ah = a.h * (sa || 1);
    const bw = b.w * (sb || 1), bh = b.h * (sb || 1);
    return Math.abs(a.x - b.x) * 2 < (aw + bw) &&
           Math.abs(a.y - b.y) * 2 < (ah + bh);
  }

  function handleCollisions() {
    // 子弹 vs 敌机
    for (const b of bullets) {
      if (b.dead) continue;
      for (const e of enemies) {
        if (e.dead) continue;
        if (hit(b, e)) {
          b.dead = true;
          e.hp -= CONFIG.bullet.damage;
          spawnExplosion(b.x, b.y, CONFIG.fx.bulletHit);
          Sound.hit();
          if (e.hp <= 0) {
            e.dead = true;
            addCombo();                                       // 累加连击
            const gained = e.value * comboMultiplier();       // 连击倍率
            Game.score += gained;
            spawnExplosion(e.x, e.y, CONFIG.fx.enemyKill);
            scorePops.push(new ScorePop(e.x, e.y, gained));   // 得分飘字
            triggerShake(CONFIG.shake.killAmp);               // 屏幕震一下
            maybeDropPowerup(e.x, e.y);                       // 概率掉道具
            Sound.explode();
          }
          break;
        }
      }
    }
    // 玩家拾取道具
    if (player) {
      for (const pu of powerups) {
        if (pu.dead) continue;
        if (hit(player, pu, CONFIG.player.hitboxScale * 1.6, 1)) {
          pu.dead = true;
          applyPowerup(pu.type);
        }
      }
    }
    // 敌弹 vs 玩家：护盾/无敌期间不掉血，但子弹仍会被挡掉（爆炸消失），不再幽灵穿身
    if (player) {
      const shielded = Game.invincible > 0 || Game.shieldTime > 0;
      for (const eb of enemyBullets) {
        if (eb.dead) continue;
        if (hit(player, eb, CONFIG.player.hitboxScale, 1)) {
          eb.dead = true;
          spawnExplosion(eb.x, eb.y, CONFIG.fx.playerCrash);
          if (shielded) {
            // 护盾/无敌：挡掉子弹但不掉血、不连击清零；继续判定其余子弹，
            // 这样同一帧内多发子弹都会被挡下，不会有漏网的穿身
            Sound.shieldBlock();
            continue;
          }
          triggerShake(CONFIG.shake.crashAmp);
          Sound.crash();
          damagePlayer();
          break;
        }
      }
    }
    // 敌机 vs 玩家：无敌/护盾时间内跳过整次判定，避免一帧内被多架敌机连扣
    if (player && Game.invincible <= 0 && Game.shieldTime <= 0) {
      for (const e of enemies) {
        if (e.dead) continue;
        // 玩家命中范围缩小到机身中间一小块（hitboxScale），敌机用完整尺寸
        if (hit(player, e, CONFIG.player.hitboxScale, 1)) {
          e.dead = true;
          spawnExplosion(e.x, e.y, CONFIG.fx.playerCrash);
          triggerShake(CONFIG.shake.crashAmp);
          Sound.crash();
          damagePlayer();
          break; // 本次只受一击，剩余敌机留待无敌结束后再判定
        }
      }
    }
  }

  function damagePlayer() {
    Game.hp -= 1;
    dropPower();        // 被撞火力降一级
    Game.combo = 0;     // 连击断掉
    Game.comboTimer = 0;
    if (player) player.hitFlash = CONFIG.player.hitFlashMs;
    Game.invincible = CONFIG.player.invincibleMs; // 受击后给一段无敌缓冲
    if (Game.hp <= 0) {
      Game.hp = 0;
      endGame();
    }
  }

  /* ===================== 状态切换 ===================== */

  function startGame() {
    Game.state = "playing";
    Game.score = 0;
    Game.hp = CONFIG.player.maxHp;
    Game.elapsed = 0;
    Game.lastEnemySpawn = 0;
    Game.lastFire = 0;
    Game.lastManualFire = 0;
    Game.invincible = 0;
    Game.shake = 0;
    Game.shakeAmp = 0;
    Game.power = 1;
    Game.combo = 0;
    Game.comboTimer = 0;
    Game.bombs = 0;
    Game.shieldTime = 0;
    bullets = [];
    enemies = [];
    enemyBullets = [];
    powerups = [];
    particles = [];
    scorePops = [];
    player = new Player();
  }

  function endGame() {
    Game.state = "over";
    if (Game.score > Game.best) {
      Game.best = Game.score;
      try { localStorage.setItem("planeWarBest", String(Game.best)); }
      catch (e) { /* 忽略存储失败 */ }
    }
    if (player) spawnExplosion(player.x, player.y, CONFIG.fx.gameOver);
  }

  /* ===================== 5. 主循环 ===================== */

  function update(dt) {
    // 星空始终滚动
    updateStars(dt);
    // 粒子始终更新（用于结束动画）
    for (const p of particles) p.update(dt);
    particles = particles.filter((p) => !p.dead);
    // 得分飘字始终更新淡出
    for (const sp of scorePops) sp.update(dt);
    scorePops = scorePops.filter((sp) => !sp.dead);
    // 屏幕震动衰减（即使非 playing 也让它自然归零）
    if (Game.shake > 0) {
      Game.shake -= dt;
      if (Game.shake <= 0) { Game.shake = 0; Game.shakeAmp = 0; }
    }

    // paused / ready / over 都不推进游戏逻辑
    if (Game.state !== "playing") return;

    Game.elapsed += dt;

    // 无敌计时倒数
    if (Game.invincible > 0) Game.invincible -= dt;
    // 护盾计时倒数
    if (Game.shieldTime > 0) Game.shieldTime -= dt;
    // 连击保持窗口倒数，超时断连
    if (Game.comboTimer > 0) {
      Game.comboTimer -= dt;
      if (Game.comboTimer <= 0) { Game.comboTimer = 0; Game.combo = 0; }
    }

    // 玩家
    player.update(dt);

    // 射击：自动开火（空格可手动追加一发，仍受开火间隔约束）
    Game.lastFire += dt;
    if (Game.lastFire >= CONFIG.player.fireInterval) {
      fire();
      Game.lastFire = 0;
    }
    // 空格手动射击：按住时按 manualFireInterval 节奏额外开火
    Game.lastManualFire += dt;
    if (keys[" "] && Game.lastManualFire >= CONFIG.player.manualFireInterval) {
      fire();
      Game.lastManualFire = 0;
    }

    // 子弹
    for (const b of bullets) b.update(dt);
    bullets = bullets.filter((b) => !b.dead);

    // 敌机生成（受屏幕数量上限约束，避免后期“一堵墙”）
    Game.lastEnemySpawn += dt;
    if (Game.lastEnemySpawn >= spawnInterval()) {
      if (enemies.length < CONFIG.enemy.maxOnScreen) {
        enemies.push(new Enemy(difficultyScale()));
      }
      Game.lastEnemySpawn = 0;
    }
    for (const e of enemies) e.update(dt);
    enemies = enemies.filter((e) => !e.dead);

    // 敌机子弹
    for (const eb of enemyBullets) eb.update(dt);
    enemyBullets = enemyBullets.filter((eb) => !eb.dead);

    // 掉落道具
    for (const pu of powerups) pu.update(dt);
    powerups = powerups.filter((pu) => !pu.dead);

    // 碰撞
    handleCollisions();
  }

  function drawBackground() {
    ctx.fillStyle = "#070b1e";
    ctx.fillRect(0, 0, W, H);
    // save/restore 隔离 globalAlpha，绘制后必定恢复，不影响后续实体
    ctx.save();
    ctx.fillStyle = "#aab6e8";
    for (const s of stars) {
      ctx.globalAlpha = 0.5 + s.r / 3;
      ctx.fillRect(s.x, s.y, s.r, s.r);
    }
    ctx.restore();
  }

  function drawHUD() {
    ctx.save();
    ctx.fillStyle = "#e6ecff";
    ctx.font = "bold 18px sans-serif";
    ctx.textAlign = "left";
    ctx.fillText("得分 " + Game.score, 14, 28);
    ctx.textAlign = "right";
    ctx.fillText("最高 " + Game.best, W - 14, 28);

    // 生命值（心形方块）
    ctx.textAlign = "left";
    for (let i = 0; i < CONFIG.player.maxHp; i++) {
      ctx.fillStyle = i < Game.hp ? "#ff5a7a" : "#3a3f5c";
      ctx.fillRect(14 + i * 22, 40, 16, 14);
    }

    // 火力等级 + 炸弹库存（生命条右侧）
    const infoX = 14 + CONFIG.player.maxHp * 22 + 12;
    ctx.fillStyle = "#ffd24a";
    ctx.font = "bold 13px sans-serif";
    ctx.fillText("火力 x" + Game.power, infoX, 52);
    ctx.fillStyle = "#ff9a9a";
    ctx.fillText("炸弹 " + Game.bombs + " (B)", infoX + 78, 52);

    // 连击显示（右侧，连击≥2 时高亮并显示倍率）
    if (Game.combo >= 2) {
      const mult = comboMultiplier();
      ctx.textAlign = "right";
      ctx.fillStyle = "#ffe680";
      ctx.font = "bold 22px sans-serif";
      ctx.fillText(Game.combo + " COMBO", W - 14, 56);
      if (mult > 1) {
        ctx.fillStyle = "#ff8a5a";
        ctx.font = "bold 14px sans-serif";
        ctx.fillText("得分 x" + mult, W - 14, 74);
      }
    }

    // 护盾剩余时间提示
    if (Game.shieldTime > 0) {
      ctx.textAlign = "left";
      ctx.fillStyle = CONFIG.shield.ringColor;
      ctx.font = "bold 13px sans-serif";
      ctx.fillText("护盾 " + (Game.shieldTime / 1000).toFixed(1) + "s", 14, 70);
    }
    ctx.restore();
  }

  function drawCenterText(title, sub) {
    ctx.save();
    ctx.textAlign = "center";
    ctx.fillStyle = "#e6ecff";
    ctx.font = "bold 40px sans-serif";
    ctx.fillText(title, W / 2, H / 2 - 20);
    ctx.fillStyle = "#9fb0e8";
    ctx.font = "16px sans-serif";
    ctx.fillText(sub, W / 2, H / 2 + 24);
    ctx.restore();
  }

  // 护盾光环：护盾期间在玩家四周画一圈半透明脉动圆环
  function drawShieldRing() {
    if (!player || Game.shieldTime <= 0) return;
    ctx.save();
    const r = Math.max(player.w, player.h) * 0.75;
    const pulse = 0.4 + 0.3 * Math.sin(Game.elapsed / 120);
    ctx.globalAlpha = pulse;
    ctx.strokeStyle = CONFIG.shield.ringColor;
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.arc(player.x, player.y, r, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
  }

  function render() {
    drawBackground();

    // 屏幕震动：对背景之外的所有内容施加随机平移偏移
    ctx.save();
    if (Game.shake > 0 && Game.shakeAmp > 0) {
      const k = Game.shake / CONFIG.shake.decayMs;        // 1→0 衰减
      const amp = Game.shakeAmp * k;
      ctx.translate((Math.random() * 2 - 1) * amp,
                    (Math.random() * 2 - 1) * amp);
    }

    for (const p of particles) p.draw();
    for (const sp of scorePops) sp.draw();

    if (Game.state === "playing" || Game.state === "paused") {
      for (const pu of powerups) pu.draw();
      for (const b of bullets) b.draw();
      for (const eb of enemyBullets) eb.draw();
      for (const e of enemies) e.draw();
      if (player) {
        drawShieldRing();   // 护盾时在玩家外画一圈光环
        player.draw();
      }
      drawHUD();
      if (Game.state === "paused") {
        // 半透明遮罩 + 暂停提示
        ctx.save();
        ctx.fillStyle = "rgba(6, 10, 28, 0.6)";
        ctx.fillRect(0, 0, W, H);
        ctx.restore();
        drawCenterText("已暂停", "按 P / Esc 继续");
      }
    } else if (Game.state === "ready") {
      drawCenterText("飞机大战", "按 回车 / 点击屏幕 开始");
      ctx.save();
      ctx.textAlign = "center";
      ctx.fillStyle = "#6f7fb0";
      ctx.font = "13px sans-serif";
      ctx.fillText("方向键 / WASD 移动 · 自动射击（空格加射）", W / 2, H / 2 + 56);
      ctx.fillText("B 放炸弹 · P/Esc 暂停 · M 静音", W / 2, H / 2 + 76);
      ctx.restore();
    } else if (Game.state === "over") {
      drawHUD();
      drawCenterText("游戏结束", "本局得分 " + Game.score);
      ctx.save();
      ctx.textAlign = "center";
      ctx.fillStyle = "#9fb0e8";
      ctx.font = "16px sans-serif";
      ctx.fillText("按 回车 / 点击 重新开始", W / 2, H / 2 + 60);
      ctx.restore();
    }

    ctx.restore(); // 结束震动偏移
  }

  // 主循环（带 dt 钳制，防止切后台后 dt 暴增）
  let lastTime = 0;
  function loop(now) {
    let dt = now - lastTime;
    lastTime = now;
    if (!isFinite(dt) || dt < 0) dt = 16;
    if (dt > 50) dt = 50; // 钳制

    try {
      update(dt);
      render();
    } catch (err) {
      // 运行时错误兜底：避免循环彻底崩溃
      console.error("游戏运行出错:", err);
      ctx.fillStyle = "#ff5a7a";
      ctx.font = "14px sans-serif";
      ctx.textAlign = "center";
      ctx.fillText("发生错误，请刷新页面", W / 2, H / 2);
    }
    requestAnimationFrame(loop);
  }

  /* ===================== 启动 ===================== */
  initStars();
  requestAnimationFrame(loop);

})();
</script>
</body>
</html>
